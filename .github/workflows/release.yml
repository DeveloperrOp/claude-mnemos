name: Release Installers

on:
  push:
    tags:
      - "v*"
  # Manual trigger: builds all platforms WITHOUT publishing a release.
  # Used to verify the pipeline itself (e.g. the Node 24 actions migration).
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: claude-mnemos-setup-x64.exe
            artifact_path: installer/windows/dist/claude-mnemos-setup-x64.exe
          - os: macos-latest
            artifact: claude-mnemos.dmg
            artifact_path: installer/macos/dist/claude-mnemos.dmg
          - os: ubuntu-latest
            artifact: claude-mnemos-x86_64.AppImage
            artifact_path: installer/linux/dist/claude-mnemos-x86_64.AppImage

    steps:
      # Node 24 migration (GitHub forces node24 runtime from 2026-06-16):
      # checkout v6 / setup-python v6 / setup-node v6 / upload-artifact v7 /
      # download-artifact v8 / action-gh-release v3 are the node24-native majors.
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install Python deps (non-mac)
        if: matrix.os != 'macos-latest'
        run: |
          python -m pip install --upgrade pip
          pip install -e .[installer] pytest pytest-asyncio

      - name: Install Python deps (mac)
        if: matrix.os == 'macos-latest'
        run: |
          python -m pip install --upgrade pip
          pip install -e .[installer] "py2app>=0.28.8" pytest pytest-asyncio "setuptools<81"

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Run pytest (smoke)
        run: |
          python -m pytest tests/test_runtime.py tests/test_cli_hook.py tests/test_postinstall.py tests/test_pyinstaller_spec.py -v

      - name: Build PyInstaller bundle
        run: python -m PyInstaller installer/pyinstaller/mnemos.spec --noconfirm

      - name: Smoke-test the bundle
        run: python -m pytest tests/installer/test_pyinstaller_smoke.py -v

      - name: Build Windows installer
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer/windows/mnemos.iss

      # Portable zip — bypasses Windows App Control / SmartScreen which
      # blocks unsigned installers. User unzips and runs claude-mnemos.exe
      # directly. Includes the same PyInstaller bundle the installer ships.
      - name: Build Windows portable zip
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path installer/windows/dist | Out-Null
          Compress-Archive `
            -Path dist/claude-mnemos/* `
            -DestinationPath installer/windows/dist/claude-mnemos-portable-x64.zip `
            -Force

      - name: Upload portable zip artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v7
        with:
          name: claude-mnemos-portable-x64.zip
          path: installer/windows/dist/claude-mnemos-portable-x64.zip
          if-no-files-found: error

      - name: Build macOS DMG
        if: matrix.os == 'macos-latest'
        run: |
          brew install create-dmg
          bash installer/macos/build-dmg.sh

      - name: Build Linux AppImage
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 imagemagick
          bash installer/linux/build-appimage.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    # workflow_dispatch runs are pipeline checks — build everything, publish nothing.
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          # ** glob: tolerant to download-artifact changing its per-artifact
          # subdirectory layout between majors.
          files: |
            artifacts/**/claude-mnemos-setup-x64.exe
            artifacts/**/claude-mnemos-portable-x64.zip
            artifacts/**/claude-mnemos.dmg
            artifacts/**/claude-mnemos-x86_64.AppImage
